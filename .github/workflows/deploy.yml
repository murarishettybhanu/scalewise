name: Deploy ScaleWise Bot

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  PROJECT_ID: project-ed393033-4d39-4f83-820
  GAR_LOCATION: us-central1
  REPOSITORY: scalewise-repo
  IMAGE: bot
  # The following should be set as GitHub Secrets
  # GCE_INSTANCE: ${{ secrets.GCE_INSTANCE_NAME }}
  # GCE_ZONE: ${{ secrets.GCE_INSTANCE_ZONE }}

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authorize Docker
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev

      - name: Build and Push Container
        run: |-
          docker build -t "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:latest" ./bot
          docker push "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:latest"

  deploy:
    name: Deploy to GCE
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Google Auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: SSH and Redeploy
        run: |-
          gcloud compute ssh ${{ secrets.GCE_INSTANCE_NAME }} \
            --zone=${{ secrets.GCE_INSTANCE_ZONE }} \
            --command="cd bot && sudo bash startup.sh" \
            --quiet
